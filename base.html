<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sample Stock Market App{% endblock %}</title>
  <style>
    :root { --accent: #0f9d58; --bg: #f7f8fa; --line: #e5e7eb; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           margin: 0; background: var(--bg); color: #1f2937; }
    header { background: #fff; border-bottom: 1px solid var(--line); padding: 16px 24px; }
    header a { color: var(--accent); text-decoration: none; margin-right: 18px; font-weight: 600; }
    header .badge { float:right; font-size:12px; color:#6b7280; font-weight:500; }
    main { max-width: 880px; margin: 0 auto; padding: 28px 24px; }
    h1 { margin-top: 0; }
    table { border-collapse: collapse; width: 100%; background: #fff; border: 1px solid var(--line); }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); }
    th { background: #f1f5f9; }
    tr:last-child td { border-bottom: 0; }
    .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:18px; margin-bottom:16px; }
    .pill { display:inline-block; background:#e6f6ec; color:var(--accent);
            border-radius:999px; padding:2px 10px; font-size:13px; }
    .score { font-variant-numeric: tabular-nums; color:#6b7280; }
    .up { color: #0f9d58; font-weight: 600; }
    .down { color: #d92d20; font-weight: 600; }
    form.search { margin: 0 0 20px; }
    form.search input[type=text] { padding:8px 12px; width:60%; border:1px solid var(--line); border-radius:8px; }
    form.search button { padding:8px 16px; border:0; background:var(--accent); color:#fff; border-radius:8px; cursor:pointer; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('companies') }}">Companies</a>
    <a href="{{ url_for('search') }}">Search</a>
    <a href="http://localhost:5601" target="_blank" rel="noopener">Kibana ↗</a>
    <span class="badge">powered by Elasticsearch · sample data, not financial advice</span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
